name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instala dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Testes (pytest)
        run: pytest

      # Executa apenas os notebooks autocontidos (sem dependências externas).
      # Os notebooks 02/03/05 usam amostras de áudio baixadas/locais e ficam
      # fora da execução automática até serem tornados autocontidos.
      - name: Executa notebooks autocontidos
        run: |
          jupyter nbconvert --to notebook --execute --output-dir /tmp/nb-out \
            notebooks/06-amostragem-aliasing.ipynb \
            notebooks/07-filtros-digitais.ipynb
