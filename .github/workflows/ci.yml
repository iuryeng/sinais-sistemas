name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instala dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Testes (pytest)
        run: pytest

      # Executa os notebooks autocontidos (as amostras de áudio dos notebooks
      # 02/03/05 são baixadas por URL em runtime, com fallback sintético).
      # O notebook 04 fica fora por um bug pré-existente (exemplo 8.8 chama
      # `func_original8`, nunca definido) — follow-up separado.
      - name: Executa notebooks autocontidos
        run: |
          jupyter nbconvert --to notebook --execute --output-dir /tmp/nb-out \
            notebooks/01-sinais-elementares.ipynb \
            notebooks/02-classificacao-sistemas.ipynb \
            notebooks/03-analise-sinais-sonoros.ipynb \
            notebooks/05-convolucao-rir.ipynb \
            notebooks/06-amostragem-aliasing.ipynb \
            notebooks/07-filtros-digitais.ipynb \
            notebooks/08-sinais-vitais-do-espectro.ipynb \
            notebooks/09-espectrograma-tempo-frequencia.ipynb
