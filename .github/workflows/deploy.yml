name: Deploy JupyterLite

# Publica o site interativo (notebooks executáveis no navegador, via Pyodide)
# no GitHub Pages. Roda no master (após merge) e sob demanda.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instala o JupyterLite
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lite.txt

      - name: Constrói o site (notebooks como conteúdo)
        run: jupyter lite build --contents notebooks --output-dir _output

      - name: Publica o artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _output

  deploy:
    needs: build
    # nos PRs apenas validamos o build; o deploy só ocorre no master / sob demanda
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
